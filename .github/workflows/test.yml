name: VaultDAO CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/vault

      - name: Run fmt check
        run: cargo fmt --all -- --check
        working-directory: contracts/vault

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: contracts/vault

      - name: Build WASM contract
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts/vault

      - name: Run tests
        run: cargo test
        working-directory: contracts/vault

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_CONTRACT_ID: "CDXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
          VITE_SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
          VITE_STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_STELLAR_NETWORK: "TESTNET"
          VITE_HORIZON_URL: "https://horizon-testnet.stellar.org"
          VITE_STELLAR_EXPLORER_URL: "https://stellar.expert/explorer/testnet"
          VITE_COLLAB_WS_URL: "ws://localhost:1234"
